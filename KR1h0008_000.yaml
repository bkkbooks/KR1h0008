body:
  text: 欽定四庫全書經部八論語筆解四書類提要臣等謹案論語筆解二巻舊本題唐韓愈李翺同撰中閒所注以韓曰李曰為别考張籍集祭韓愈詩有論語未訖注手跡今微茫句邵博聞見後錄遂引為論語注未成之據而李漢作韓愈集序則稱有論語注十卷與籍詩異王楙野客叢書又引為已成之證晁公武讀書志稱四庫邯鄲書目皆無之獨田氏書目有韓氏論語十卷筆解兩卷是論語注外别出筆解矣新唐書藝文志載愈論語注十巻亦無筆解惟鄭樵通志著録二卷與今本同意其書出于北宋之末然唐李匡乂宣宗大中時人也所作資暇集一條云論語宰予晝寢梁武讀為寢室之寢晝作胡卦反且云當為畫字言其繪畫寢室今人罕知其由咸以為韓文公所訓解又一條云傷人乎不問馬今亦謂韓文公讀不為否然則大中之前已有此本未可謂為宋人偽撰且晝寢一條今本有之廐焚一條今本不載使作偽者剽掇此文不應兩條相連摭其一而遺其一又未可謂因此依託也以意推之疑愈注論語時或先于簡端有所記録翺亦問相討論附書其間迨書成之後後人得其稿本採注中所未載者别録為二卷行之如程子有易傳而遺書之中又别有論易諸條朱子有詩傳而朱鑑又為詩傳遺説之例題曰筆解明非所自編也其今本或有或無者則由王存以前世無刋本傳冩或有異同邵博所稱三月字作音一條王楙所見本亦無之則諸本互異之明證矣王存本今未見魏仲舉刻韓文五百家注以此書附末今傳本亦稀此本為明范欽從許勃本傳刻又趙希升讀書附志曰其間翺曰者李習之也明舊本愈不著名而翺所説則題名以别之此本改稱韓曰李曰亦非其舊矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀論語筆解序昌黎文公著筆解論語一十卷其間翺曰者盖李習之同與切磨世所傳率多訛舛始愈筆大義則示翺翺從而交相明辨非獨韓制此書也噫齊魯之門人所記善言既有同異漢魏學者注集繁闊罕造其精今觀韓李二學勤拳淵㣲可謂窺聖人之堂奥矣豈章句之技所可究極其㫖哉予繕校舊本數家得其純粹欲以廣傳故序以𤼵之
