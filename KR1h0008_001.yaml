body:
  text: 欽定四庫全書論語筆解卷上唐韓愈李翺撰學而第一有子曰信近於義言可復也馬曰其言可反覆故曰近義韓曰反本要終謂之復言行合宜終復乎信否則小信未孚非反覆不定之謂李曰尾生之信非義也若要終合宜必不抱橋徒死馬云反覆失其㫖矣恭近於禮逺恥辱也馬曰恭不合禮非禮也能逺恥辱故近禮韓曰禮恭之本也知恭而不知禮止逺辱而已謂恭必以禮為本李曰晉世子申生恭命而死君子謂之非禮若恭而不死則得禮矣因不失其親亦可宗也孔曰因親也所親不失其親亦可宗敬韓曰因訓親非也孔失其義觀有若上陳信義恭禮之本下言凡學必因上禮義二說不失親師之道則可尊矣李曰因之言相因也信義而復本禮因恭而逺嫌皆不可失斯乃可尊子曰敏於事而愼於言就有道而正焉可謂好學也矣孔曰敏疾也有道有道德者正謂問事是非韓曰正謂問道非問事也上句言事下句言道孔不分釋之則事與道混而無别矣李曰凡人事政事皆謂之事迹若道則聖賢德行非記誦文辭之學而已孔子曰有顔回者好學不遷怒不二過此稱為好學孔云問事是非蓋得其近者小者失其大端為政第二子曰詩三百一言以蔽之曰思無邪包曰蔽猶當也又曰歸於正也韓曰蔽猶斷也包以蔽為當非也按思無邪是魯頌之辭仲尼言詩最深義而包釋之略矣李曰詩三百篇斷在一言終於頌而已子夏曰發乎情民之性也故詩始於風止乎禮義先王之澤也故終無邪一言詩之斷也慮門人學詩徒誦三百之多而不知一言之斷故云然爾子曰吾五十而知天命孔曰知天命之終始韓曰天命深微至賾非原始要終一端而已仲尼五十學易窮理盡性以至於命故曰知天命李曰天命之謂性易者理性之書也先儒失其傳惟孟軻得仲尼之藴故盡心章云盡其心所以知性修性所以知天此天命極至之說諸子罕造其微六十而耳順七十而從心所欲不踰矩鄭曰耳聞其言知其微㫖也馬曰矩法也從心所欲無非法韓曰耳當為爾猶言如此也既知天命又如此順天也李曰上聖既順天命豈待七十不踰矩法哉蓋孔子興言時已七十矣是自衛反魯之時也刪修禮樂詩書皆本天命而作如其順子曰溫故而知新可以為師矣孔曰溫尋也尋繹故者又知新者可以為師矣韓曰先儒皆謂尋繹文翰由故及新此是記問之學不足為人師也吾謂故者古之道也新謂己之新意可為新法李曰仲尼稱子貢云告諸往而知來者此與溫故知新義同孔謂尋繹文翰則非子曰君子不器子貢問君子子曰先行其言而後從之孔曰疾小人多言而行不周韓曰上文君子不器與下文子貢問君子是一段義孔失其㫖反謂疾小人有戾於義李曰子貢門人上科也自謂通才可以不器故聞仲尼此言而尋發問端仲尼謂但行汝言然後從而知不器在汝非謂小人明矣子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也孔曰文質禮變馬曰所因謂三綱五常所損益謂文質三統韓曰孔馬皆未詳仲尼從周之意泛言文質三統非也李曰損益者盛衰之始也禮之損益知時之盛衰因者謂時雖變而禮不革也禮不革則百世不衰可知焉窮此深㫖其在周禮乎韓曰後之繼周者得周禮則盛失周禮則衰孰知因之之義其深矣乎八佾第三季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曾謂泰山不如林放乎馬曰救止也包曰泰山之神反不如林放者乎韓曰謂當作為字言冉有為泰山非禮反不如林放問禮乎包言泰山之神非其義也子曰吾不與祭如不祭包曰不自親祭使攝者為之不盡敬與不祭同韓曰義連上文禘自既灌而往吾不欲觀之矣蓋魯僖公亂昭穆祭神如神在不可躋而亂也故下文云吾不與祭蓋嘆不在其位不得以正此禮矣故云如不祭言魯逆祀與不祀同焉李曰包既失之孔又甚焉孔注祭神如神在謂祭百神尤於上下文乖舛子貢欲去告朔之餼羊鄭曰禮人君每月告朔於廟有祭謂之廟享韓曰人君謂天子也非諸侯通用一禮也魯自文公六年閏月不告朔猶朝於廟左氏曰不告朔非也吾謂魯祀周公以天子禮魯君每月朔不朝於周但朝周公之廟因而祭曰廟享其實以祭為重爾文公既不行告朔之享而空朝於廟是失禮也然子貢非不知魯禮之失特假餼羊之問誠欲質諸聖人以正其禮爾又曰天子云聽朝謂聽政於天下也諸侯云告朔謂以下之政告於上也每月頒朔於諸侯諸侯稟朔奉王命藏祖廟於是魯有廟享之文他國則亡此禮李曰襄二十九年凡三正月公在楚左氏曰釋不朝正於廟吾謂魯禮正月嵗首謂之朝正也月即謂之告朔蓋二禮歟又曰案周禮正月之吉始和布治於邦國都鄙蓋當時諸侯皆有稟命告朔明文其所無者惟朝正不侔周公廟享爾里仁第四子曰君子之於天下也無適也無莫也義之與比韓曰無適無可也無莫無不可也惟有義者與相親比爾李曰下篇第九云子絶四曰毋固注云無可無不可在毋固執焉王通云可不可天下所共存也孟子曰惟義所在其㫖同子曰君子懷德小人懷土君子懷刑小人懷惠孔曰懷德懷安也懷土重遷也懷刑安於法也包曰懷惠恩惠也韓曰德難形容必示之以法制土難均平必示之以恩惠上下二義轉相明也李曰君子非不懷土也知土均之法乃懷之矣小人只知土著樂生之惠殊不知土之德何極於我哉子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣孔曰直曉不問故答曰唯韓曰說者謂忠與恕一貫無偏執也李曰參也魯是其忠焉參至孝是其恕也仲尼嘗言忠必恕恕必忠闕一不可故曽子聞道一以貫之便曉忠恕而已子游曰事君數斯辱矣朋友數斯疏矣包曰數謂速數之數韓曰君命召不俟駕速也豈以速為辱乎吾謂數當謂頻數之數李曰頻數再三瀆必辱矣朋友頻瀆則益疏矣包云速數非其㫖公冶長第五子使漆雕開仕對曰吾斯之未能信子說韓曰未能見信於時未可以仕也子說者善其能忖己知時變李曰孔言未能究習是開未足以仕非經義也鄭言志道深是開以不仕為得也非仲尼循循善誘之意云善其能忖己知時變斯得矣子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也包曰既然子貢不如復云吾與女俱不如者蓋欲以慰子貢爾韓曰回亞聖矣獨問子貢孰愈是亦賜之亞回矣賜既發明顔氏具聖之體又安用慰之乎包失其㫖李曰此最深義先儒未有究其極者吾謂孟軻語顔回深入聖域云具體而微其以分限為差别子貢言語科深於顔回不相絶逺謙云得具體之二分蓋仲尼嘉子貢亦窺見聖奧矣慮門人惑以謂回多聞廣記賜寡聞陋學故復云俱弗如以釋門人之惑非慰之云也韓曰吾觀子貢此義深微當得具體八分所不及回二分爾不然安得仲尼稱弗如之深乎宰豫晝寢子曰朽木不可雕也糞土之牆不可杇也於子與何誅舊文作畫字韓曰晝當為畫字之誤也宰豫四科十哲安得有晝寢之責乎假或偃息亦未深誅又曰於豫顯是言宰豫也下文始吾今吾者即是仲尼自謂也李曰於豫與何誅并下文於豫與改是二句先儒亦失其㫖吾謂仲尼雖以宰豫髙間晝寢於宰豫之才何責之有下文云於宰豫言行雖晝寢未為太過使改之不晝亦可矣子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也孔曰性者人所受以生也天道者元亨日新之道深微故不可得而聞也韓曰孔說粗矣非其精藴吾謂性與天道一義也若解二義則人受以生何者不可得聞乎哉李曰天命之謂性是天人相與一也天亦有性春仁夏禮秋義冬智是也人之率性五常之道是也蓋門人只知仲尼文章而少克知仲尼之性與天道合也非子貢之深藴其知天人之性乎雍也第六子曰人之生也直罔之生也幸而免馬日人之生自終者以其正直也包日誣罔正直是幸也韓曰直當為德字之誤也言人生稟天地大德罔無也若無其德免於咎者鮮矣古書德作德李曰洪範三德正直在其中剛柔共成焉無是一者必有咎况咸無之其能免乎包謂誣枉正直則罪無赦何幸免哉馬言自終又非生也之義子曰齊一變至於魯魯一變至於道包曰齊可使如魯魯可使如大道行之時韓曰道謂王道非大道之謂李曰有王道焉吾從周是也有霸道焉正而不譎是也有師道焉得天子禮樂吾舍魯何適是也然霸道可以至師道師道可以至王道此三者皆以道言也非限之以器也故下文云觚不觚言器不器也觚哉重言不器所以臻道也子曰君子博學於文約之以禮亦可以弗畔矣夫鄭曰弗畔不違道也韓曰畔當讀如偏畔之畔弗偏則得中道李曰文勝則流靡必簡約禮稱君子之中庸是也鄭言違畔之畔豈稱君子云哉失之逺矣子見南子子路不說夫子矢之曰豫所否者天厭之天厭之孔曰行道非婦人之事與之呪誓義可疑焉韓曰矢陳也否當為否泰之否厭當為厭亂之厭孔失之矣為誓非也後儒因以誓又以厭為擫益失之矣吾謂仲尼見衛君任南子之用事乃陳衛之政理告子路云子道否不得行汝不須不悅也天將厭此亂世而終豈泰吾道乎李曰古文闊略多為俗儒穿鑿遂失聖人經㫖今退之發明深義決無疑焉述而第七子曰述而不作信而好古竊比於我老彭包曰若老彭祖述之而已韓曰先儒多謂仲尼謙詞失其㫖矣吾謂仲尼傷己不遇嘆其道若老彭而已李曰下文子曰甚矣吾衰也久矣吾不復夢見周公是制禮作樂慕周公所為豈若老彭述古事而已顯非謙詞蓋嘆當世鄙俗竊以我比老彭無足稱爾韓曰殷賢惟伊傅餘固蔑稱子曰自行束修以上吾未嘗無誨焉孔曰言人能奉禮自行束修以上則皆教誨之焉韓曰說者謂束為束帛修為羞脯人能奉束修於吾則皆教誨之此義失也吾謂以束修為束羞則然矣行吾而教之非也仲尼言小子灑掃進退束修末事但能勤行此小者則吾必教誨其大者李曰誨人不倦此其㫖也冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也鄭曰父子爭國惡也孔子以夷齊賢且仁故知不助衛君明矣韓曰上篇云伯夷叔齊不念舊惡怨是用希此言君子雖惡不怨也又下篇云不降其志不辱其身伯夷叔齊歟我則異於是無可無不可吾嘗疑三處言夷齊各不同吾謂此段義稱賢且仁者蓋欲止冉有為衛君而已李曰聖人之言無定體臨事制宜孟軻論之最詳曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也時行則行時止則止大抵仲尼與時偕行與時偕極無可無不可是其㫖也其餘稱賢且仁誠非定論韓曰習之深乎哉吾今乃知仲尼之言瞻之在前忽然在後不可槩窺其極子所雅言詩書執禮皆雅言也孔曰雅音正言也鄭曰先王典法必正言其音然後義全韓曰音作言字之誤也傳寫因注云雅音正言遂誤爾李曰孔鄭注皆分明但誤一音字後人惑之蓋一時門弟之所記録云子所雅言即下云詩書執禮皆雅言也云爾其義煥然無惑泰伯第八子曰恭而無禮則勞愼而無禮則葸勇而無禮則亂直而無禮則絞王曰葸懼貌絞刺也韓曰王注云不以禮節之吾謂禮者制中者也不及則為勞為葸過則為亂為絞絞確也李曰上篇云禮之用和為貴不以禮節之亦不可行此言發而皆中節謂之和也今言恭必企而進禮不可太過大抵取其制中而已乎韓曰上篇云中庸之為德也其至矣乎民鮮久矣此正謂言禮之皇極也子曰興於詩立於禮成於樂包曰興起也禮所以立身樂以成性韓曰三者皆起於詩而已先儒略之遂惑於二矣李曰詩者起於吟咏情性者也發乎情是起於詩也止乎禮義是立於禮也刪詩而樂正雅頌是成於樂也三經一原也退之得之矣包氏無取焉子曰惟天為大惟堯則之蕩蕩乎民無能名焉包曰布德廣逺民無能識其名韓曰堯仁如天不可名狀其高逺非不識其名也李曰仲尼稱堯如天之難狀也亦猶顔回稱仲尼如天彌髙瞻之在前忽然在後與此義同子罕第九子罕言利與命與仁包曰寡能及之故希言韓曰仲尼罕言此三者之人焉非謂罕言此三者之道也李曰上篇云仁逺乎哉我欲仁斯仁至矣是仲尼凡於道則無不言但罕有其人是以罕言爾上篇云必有之吾未之見此罕言之義子絶四毋意毋必毋固毋我王曰不任意無專必無固行無有其身也韓曰此非仲尼自言蓋弟子記師行事其實子絶二而已吾謂無任意即是無專必也無固行即是無有己身也李曰非弟子記之繁傳之者誤以絶二為四也但見四毋字不曉二義而已亦猶手之舞之足之蹈之雖四事其實二事云子曰鳯鳥不至河不出圖吾已矣夫孔曰聖人受命則鳯凰至河出圖今無此瑞吾已矣夫者傷不得見也河圖乃八卦是也韓曰王道盛則四靈為畜非但受命符爾李曰易曰河出圖洛出書聖人則之書云簫韶九成鳯凰來儀皆言王道太和及此矣聖人傷己之不得見非受命祥瑞爾顔淵喟然嘆曰仰之彌髙鑽之彌堅瞻之在前忽然在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已包曰恍惚不可得而形容孔曰不能及夫子之所立韓曰既竭吾才如有所立卓爾此回首自謂雖卓立未能及夫子髙逺爾李曰退之深得之矣吾觀下篇云可與共學未可與適道可與立未可與權是知所立卓爾尚未可權是顔回自謂明矣孔義失其㫖子路使門人為臣鄭曰子路欲使弟子行為臣之禮也韓曰先儒多惑此說以謂素王素臣後學由是責子路欺天吾謂子路剛直無諂必不以王臣之臣欺天爾本謂家臣之臣以事孔子也李曰卿大夫稱家各有家臣若輿臣𨽻𨽻臣臺臺臣僕之類皆家臣通名仲尼是時患三家專魯而家臣用事故責子路以謂不可效三家欺天爾子曰可與共學未可與適道可與適道未可與立可與立未可與權孔曰雖能之道未必能有所立雖有所立未必能權量輕重韓曰孔注猶失其義夫學而之道者豈不能立耶權者經權之權豈輕重之權耶吾謂正文傳寫錯倒當云可與共學未可與立可與適道未可與權如此則理通矣李曰權之為用聖人之至變也非深於道者莫能及焉下文云唐棣之華偏其反而此仲尼思權之深也公羊云反經合道謂之權此其義也鄉黨第十吉月必朝服而朝孔曰吉月月朔也吉服即皮辨服也韓曰吉禮所行月日因而謂之吉月吉日非正朔而已李曰周禮云正月之吉又云月吉讀邦法今究其義皆因吉禮以别下文凶賓嘉爾鄉人儺朝服而立於阼階孔曰儺驅逐疫鬼恐驚先祖故朝服而立於廟之阼階韓曰正文無廟字又云恐驚先祖疑孔穿鑿非本㫖李曰仲尼居鄉似不能言者覩儺鬼非禮也故朝服立階欲止之使不儺適㑹時當在阼階爾别無異義子曰山梁雌雉時哉時哉子路共之三嗅而作周曰子路共之非本意不茍食故三嗅而作韓曰以為食具非其㫖吾謂嗅當為嗚嗚之嗚雉之聲也李曰子路拱之雉嗅而起記者終其事爾俗儒妄加異義不可不辨也論語筆解卷上
