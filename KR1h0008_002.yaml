body:
  text: 欽定四庫全書論語筆解卷下唐韓愈李翺撰先進第十一子曰從我於陳蔡者皆不及門也鄭曰皆不及仕進之門而失其所韓曰門謂聖人之門言弟子學道由門以及堂由堂以及室分等降之差非謂言仕進而已李曰如由也升堂未入於室此等降差别不及門猶在下列者也德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏說者曰字而不名非夫子云韓曰論語稱字不稱名者多矣仲尼既立此四品諸弟子記其字而不名焉别無異㫖李曰仲尼設四品以明學者不同科使自下升髙自門升堂自學以格於聖也其義尤深但俗儒莫能循此品第而窺聖奧焉韓曰德行科最高者易所謂默而識之故存乎德行蓋不假乎言也言語科次之者易所謂擬之而後言議之而後動擬議以成其變化不可為典要此則非政法所拘焉政事科次之者所謂雖無老成人尚有典刑言非事文辭而已文學科為下者記所謂離經辨志論學取友小成大成自下而上升者也李曰凡學聖人之道始於文文通而後正人事人事明而後自得於言言忘矣而後默識已之所行是名德行斯入聖人之奧也四科如有序但注釋不明所以然子曰回也其庶乎屢空賜不受命而貨殖焉億則屢中注曰回庶幾聖道雖數空匱而樂在其中賜不受教命唯財貨是殖億度是非蓋美回所以勵賜也韓曰一說屢猶每也空猶虛中也此近之矣謂富不虛心此說非也吾謂回則坐忘遺照是其空也賜未若回每空而能中其空也貨當為資殖當為權字之誤也子貢資於權變未受性命之理此蓋明賜之所以亞回也李曰仲尼品第回賜皆大賢豈語及貨殖之富耶集解失之甚矣吾謂言語科實資權變更能慮中乎即回之亞匹明矣子張問善人之道子曰不踐迹亦不入於室孔曰善人不但循舊迹亦少能創業然亦不入於聖人之奧室韓曰孔說非也吾謂善人即聖人異名爾豈不循舊迹而又不入聖人之室哉蓋仲尼誨子張言善人不可循迹而至於心室也聖人心室惟奧惟微無形可觀無迹可踐非子張所能至爾李曰仲尼言由也升堂未入於室室是心地也聖人有心有迹有造形有無形堂堂乎子張誠未至此子曰論篤是與君子者乎色莊者乎孔曰論篤是口無擇言君子是身無擇行色莊者不惡而嚴韓曰孔失其義吾謂論者討論也篤極也是此也論極此聖人之道因戒子張但學君子容色莊謹即可以及乎君子矣李曰與疑辭也乎語終也上句云論篤此與者言子張未極此善人也下句言莊者欲戒子張檢堂堂之過約歸於君子容貌而已孔注云三者為善人殊失聖人之本意子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死包曰言夫子在已無所敢死也韓曰死當為先字之誤也上文云顔淵後下文云回何敢先其義自明無死理也李曰以回德行亞聖之才明非敢死之士也古文脫誤包注從而訛舛退之辨得其正㸃爾何如至童子六七人浴乎沂風乎舞雩詠而歸孔曰暮春季春三月韓曰浴當為㳂字之誤也周三月夏之正月安有浴之理哉李曰仲尼與㸃蓋美其樂王道也餘人則志在諸侯故仲尼不取顔淵第十二顔淵問仁子曰克已復禮為仁馬曰克己約身也孔曰復返也身能返禮則為仁矣韓曰孔馬得其皮膚未見其心焉吾謂回問仁仲尼答以禮蓋舉五常之二以明其端焉故下文云非禮勿視非禮勿聽非禮勿言非禮勿動又舉五常之四以終其義李曰仁者五常之首也視聽言貌思五常之具也今終之以動者貌也貌為木為仁此問非顔回具體安能究仲尼之心子曰博學於文約之以禮亦可以弗畔矣夫韓曰簡編重錯雍也篇中已有君子博學於文約之以禮可以弗畔矣夫今削去此段可也子張問士何如斯可謂之達矣子曰夫達也者質直而好義察言而觀色慮以下人馬曰常有謙退之志韓曰此與上篇色莊者乎一義也皆斥言子張質直莊謹下於人則為達士矣李曰下文云夫聞也者色取仁而行違居之不疑此並戒堂堂乎張不貴必聞在乎必達子路第十三冉有退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之馬曰政者有所改更匡正事者凡行常事我為大夫雖不見任用必當與聞之韓曰政者非更改之謂也事者非謂常行事也吾謂凡干典禮者則謂之政政即常行焉則謂之行行其常則謂之人事李曰政事猶言文學也文之義包乎天地大矣學之者人也政之事包乎典禮大矣事之者人也仲尼蓋因冉有之對以明政事不可不分也子貢問曰何如斯可以為士矣子曰宗族稱其孝焉鄉黨稱其悌焉舊本子曰行已有恥為上文簡編差失也韓曰孝悌為百行之本無以上之者曰敢問其次曰行已有恥使於四方不辱君命可謂士矣曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣孔曰有恥者有所不為鄭曰硜硜小人之貌也韓曰硜硜敢勇貌非小人也小當為之字古文小與之相類傳之誤也上文既云言必信行必果豈小人為耶當作之人哉於義得矣李曰請以四科校量次第則孝悌當德行科上也使四方不辱君命當言語科次也言必信行必果當政事科又其次以推文學可知焉子曰善人教民七年亦可以即戎矣包曰郎就也戎兵也韓曰七年義不解吾謂即戎者衣裳之會兵車之會皆謂即戎矣此是諸侯朝會於王各修戎事之職按王制云三年一聘五年一朝仲尼志在尊周故言五年可以即戎事朝天子七年者字之誤歟李曰退之言尊周得其㫖矣七年五年字誤當究其詳吾謂周禮大宗伯云殷俯曰視鄭義曰殷俯一服朝之嵗也以朝者少諸侯乃使卿以大禮衆聘焉一服朝在元年七年十一年又大行人職云侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見王嵗遍存三嵗遍俯五嵗遍省七嵗屬象胥諭言語協辭命九嵗屬瞽史諭書名聽聲音十有一嵗達瑞節同度量成牢禮同數器修法則十有二嵗王巡守殷國以是究之蓋天子即位元年諸侯畢朝謂之一服朝為始也六服凡六年終至七年又復始矣十一嵗王撫諸侯禮終至十二年又亦如初故鄭注宗伯職云元年七年十一年皆舉其始也韓曰噫習之可謂究極聖人之奧矣先儒但以攻戰為即戎殊不思仲尼教民尊周謹朝聘所以警當世諸侯舉七年而元年十一年從可知矣憲問第十四子曰君子而不仁者有矣夫未有小人而仁者也孔曰雖君子猶未能備韓曰仁當為備字之誤也豈有君子而不仁者乎既稱小人又豈求其仁耶吾謂君子才行或不備者有矣小人求備則未之有也李曰孔注云備是解其不備明矣正文備作仁誠字誤一失其文寖乖其義子曰古之學者為己今之學者為人孔曰為己履而行之為人徒能言之也韓曰為己者謂以身率天下也為人者謂假他人之學以檢其身也孔云徒能言之是不能行之失其㫖矣李曰孟子云堯舜性之是天人兼通者也湯武身之是為己者也五伯假之是為人者也子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也韓曰子貢慮門人不曉仲尼言我無能焉故云自道以明有能也子貢方人子曰賜也賢乎哉夫我則不暇孔曰比方人也不暇比方人韓曰不暇比方人者其㫖安在吾謂義連上文云夫君子自道者我無能此是比方君子之言也惟子貢明之故門人記子貢方人四字下文曰賢乎哉善子貢能知我比方人耳復云不暇者終自晦也子曰作者七人矣包曰長沮桀溺丈人石門荷蕢儀封人楚狂接輿韓曰包氏以上文連此七人失其㫖吾謂别段非謂上文避世事也下文子曰别起義端作七人非以隱避為作者明矣避世本無為作者本有為顯非一義李曰其然乎包氏所引長沮已下茍合於義若於作者絶未為得吾謂包氏因下篇長沮桀溺云與其從辟人之士豈若從避世之士哉遂舉此為七人茍聨上義殊不知仲尼云鳥獸不可與同羣此則非沮桀輩為作者明矣又况下篇云逸民伯夷叔齊虞仲夷逸朱張栁下惠少連七人豈得便引為作者可乎包謬不攻自弊矣韓曰齊魯記言無不脫舛七人之數固難條列但明作者實非隱淪昭昭矣李曰以作者之謂聖之義明之則理道明矣韓曰仲尼本至誠如此乎但學者失之云耳原壤夷俟子曰老而不死是謂賊以杖扣其脛馬曰夷踞俟待也孔曰扣擊也韓曰古文叩扣文之誤也當作指為夷俟踞足原不自知失禮故仲尼既責其為賊又指其足脛使知夷踞之罪非擊之明矣衛靈公第十五衛靈公問陳於孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也鄭曰本未立不可教以末事韓曰俎豆與軍旅皆有本有末何獨於問陳為末事也鄭失其㫖吾謂仲尼因靈公問陳遂譏其俎豆之小尚未習安能講軍旅之大乎李曰俎豆宗伯之職軍旅司馬之職皆周禮之本也鄭以為末事皆乖仲尼本意子曰由知德者鮮矣王曰君子固窮而子路愠見故謂之少於知德韓曰此一句是簡編脫漏當在子路愠見下文一段為得李曰濫當為愠字之誤也仲尼因由愠見故云窮斯愠焉則知之固如由者亦鮮矣子張問行子曰立則見其參於前也在輿則見其倚於衡也夫然後行包曰衡軛也言思念忠信立則常想見參然在目前在輿則若倚車軛韓曰參古驂字衡橫木式也子張問行故仲尼喻以車乘立者如御驂在目前言人自忠信篤敬坐立不忘於乘車之間李曰大車無輗小車無軏其何以行之哉與此意同包謂驂為森失之矣子曰君子義以為質禮以行之孫以出之信以成之君子哉鄭曰義以為質謂操行也孫出之謂言語韓曰操行不獨義也禮與信皆操行也吾謂君子體質先須存義義然後禮禮然後遜遜然後信有次序焉李曰上云君子者舉古之君子也下云君子哉者言今之學者能依此次序乃能成君子耳子曰吾猶及史之闕文也有馬者借人乘之今亡矣夫包曰古之良史有疑則闕之有馬不調良則借人乘習之韓曰上句言已所不知必闕之不可假他人之言筆削也譬如有馬不能自乘而借他人乘之非已所學耳李曰上云吾猶者是喻史官闕文下句更喻馬不可借他人今亡者言吾今而後無此借乘之過也子曰君子貞而不諒孔曰貞正也諒信也君子正其道不必小信韓曰諒當為讓字誤也上文云當仁不讓於師仲尼慮弟子未曉故復云正而不讓謂仁人正直不讓於師耳孔說加一小字為小信妄就其義失之矣季氏第十六孔子曰禮樂征伐自諸侯出蓋十世希不失矣孔曰希少也周幽王為犬戎所弒平王東遷諸侯自作禮樂征伐專行始於隱公至昭公十世失政死於乾侯韓曰此義見仲尼作春秋之本也吾觀隱至昭十君誠然矣禮樂征伐自作不出於天子亦然矣若稽諸春秋吾疑十二公引十世為證非也李曰退之至矣觀隱公不書即位而書王正月定公不書正月而書即位此有以見自桓至定為十世仲尼本㫖存不言哀公未沒不可言世也韓曰其然乎吾考隱公書正月者言周雖下衰諸侯稟朔不可不書也隱攝政不書即位言不預一公之數也定書即位繼體當為魯君不書正月者不稟朔也稟朔由三桓强盛不由公室也政去公室則自桓公至定公為十世明矣李曰吾觀季氏一篇皆書孔子曰餘篇即但云子曰此足見仲尼作春秋本惡三桓正謂亂臣賊子當時弟子避季氏强盛特顯孔子之名以制三桓耳故悉書孔子曰以明當時之事三桓可畏宜其著春秋以制其彊焉韓曰深哉先儒莫之知也今驗魯論因知春秋本末惟季氏篇章學者盍三復其義自大夫出五世希不失矣孔曰季文子初得政至桓子五世為家臣陽虎所囚韓曰季孫行父自僖公時得魯政至平子意如逐昭公於乾侯終季孫斯定公八年為陽虎所伐桓子即季孫斯也仲尼既言諸侯十世又言大夫五世者斥魯君臣皆失道也李曰此又明春秋自桓至定交相驗矣陪臣執國命三世希不失矣馬曰陽虎為季氏家臣至虎三世出奔韓曰定公九年陽貨以葱靈逃奔宋遂奔於晉至哀公二年陽虎猶見於左傳蓋仲尼自定哀之際三桓與魯皆衰故春秋止於獲麟厥㫖深矣孔子曰祿之去公室五世矣鄭曰魯自東門襄仲立宣公於是政在大夫至定公五世矣韓曰此重言定公時事也上文十世五世三世希不失者蓋泛言之耳此云祿去公室五世及下文云政逮於大夫四世皆指實事言也李曰重言之知仲尼閔魯為三桓所奪臣主俱不振矣政逮於大夫四世矣孔曰文子武子悼子平子李曰注亦重解季氏當定公時季氏斯為陽虎所伐極則衰矣故夫三桓之子孫微矣孔曰三桓仲孫叔孫季孫三卿皆出桓公李曰仲尼魯定十三年自衛返魯使子路伐三桓城不克至十四年叔孫氏西狩獲麟仲尼乃作春秋始於桓終於定而已三家興於桓衰於定故徴王經以貶强臣三桓子孫微者諭默扶公室將行周道也陽貨第十七孔子時其亡也而往拜之韓曰時當為待古音亦作峙南人音作遲其實待為得子曰性相近也習相逺也子曰惟上智與下愚不移孔曰愼所習上智不可使為惡下愚不可使為賢韓曰上文云性相近是人可以習而上下也此文云上下不移是人不可習而遷也二義相反先儒莫究其義吾謂上篇云生而知之上也學而知之次也困而學之又其次也困而不學民斯為下矣與此篇二義兼明焉李曰窮理盡性以至於命此性命之說極矣學者罕明其歸今二義相戾當以易理明之乾道變化各正性命又利貞者情性也又一隂一陽之謂道繼之者善也成之者性也謂人性本相近於靜及其動感外物有正有邪動而正則為上智動而邪則為下愚寂然不動則情性兩忘矣雖聖人有所難知故仲尼稱顔回不言如愚退省其私亦足以發回也不愚蓋坐忘遺照不習如愚在卦為復天地之心邃矣亞聖而下性習近逺智愚萬殊仲尼所以云困而不學下愚不移者皆激勸學者之辭也若窮理盡性則非易莫能窮焉韓曰如子之說文雖相反義不相戾誠知乾道變化各正性命坤道順乎承天不習無不利至哉果天地之心其邃矣乎公山弗擾以費畔召子欲往至子曰如有用我者吾其為東周乎孔曰弗擾為季氏宰與陽虎共執季桓子而召孔子興周道於東方故曰東周韓曰仲尼畏三桓不欲明言往公山氏又不容順子路當季氏故言吾為東周東周平王東遷能復修西周之政志在周公典禮不徒往也非子路所測李曰孔謂興周道於東方失其㫖矣子路曰佛肸以中牟畔子之往也如之何子曰有是言也不曰堅乎磨而不磷不曰白乎涅而不緇吾豈匏瓜也哉焉能繫而不食孔曰晉大夫趙簡子邑宰不得如不食之物繫滯一處韓曰此段與公山氏義同有以知仲尼意在東周雖佛肸小邑亦往矣李曰此自衛返魯時所言也意欲伐三桓子路未曉耳子曰由也女聞六言六蔽矣乎好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊孔曰六言六蔽者下文謂六事仁智信直勇剛也仁者愛物不知所以裁之則愚蕩無所適守賊者父子不知相為隱之輩韓曰此三言是泛學五常之有蔽也不言禮與義略也好直不好學其蔽也絞韓曰絞確也堅確之義好勇不好學其蔽也亂好剛不好學其蔽也狂孔曰狂妄也詆觸也韓曰此三者指子路辭也由之為人直勇剛故以絞亂狂戒之耳李曰深乎聖人戒子路先舉仁智信以不學為蔽况直勇剛豈可不學乎孔注不分奧㫖退之其精矣乎子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與馬曰國風之始三綱之首人而不為如面牆而立韓曰吾觀周南蓋文武已沒成王當國之時也旦奭分陜故别為二南戒伯魚當知此耳李曰子夏云王者之風繫周公諸侯之風繫召公由是知仲尼刪詩首周南者本周公也列國之風首衛詩者次以康叔也周公見興周之迹康叔見革商之俗不知此義者面牆立也宜乎子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉鄭曰所貴安上治民馬曰所貴移風易俗韓曰此連上文訓伯魚之詞也馬鄭但言禮樂大略失其精微李曰慮伯魚但習二南多知蟲魚鳥獸而已不達旦奭分治邦家之本也但習玉帛鐘鼓而已不達雅頌形容君臣之美也有以知詩者禮樂之文玉帛鐘鼓禮樂之器兼通即得禮樂之道子曰色厲而內荏譬諸小人其猶穿窬之盜也與子曰鄉原德之賊也孔曰荏柔也內柔佞也周伯曰鄉向也古字同韓曰原類柔字之誤也古文逧原柔後人遂誤內柔為鄉原足以明矣李曰義連上文內荏古嵐字亦類柔字蓋仲尼重言內柔者詐為色厲則是德之賊也韓曰外柔而內厲則尚書所謂柔而立也若外厲而內柔則是穿窬盜賊爾子曰豫欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉何曰言之為益少故欲無言韓曰此義最深先儒未之思也吾謂仲尼非無言也特設此以誘子貢以明言語科未能忘言至於默識故云天何言哉且激子貢使進於德行科也李曰深乎聖人之言非子貢孰能言之孰能默識之耶吾觀上篇子貢曰夫子之言性與天道不可得而聞也又下一篇陳子禽謂子貢賢於仲尼子貢曰君子一言以為不知言不可不愼也夫子猶天不可階而升也此是子貢已識仲尼天何言哉之意明矣稱小子何述者所以探引聖人之言誠深矣哉微子第十八微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉何注曰三人行異而同稱仁以其俱在憂亂寧民韓曰殺身成仁比干以之微箕二子校之劣焉仲尼俱稱仁别有奧㫖先儒莫之釋也李曰聖人先言微子以其先去之也後言比干以其諫之晚矣中言箕子則仁兼先後得聖人中焉韓曰箕子明夷與文王同乎易象尚書洪範見武王伸其師禮然則箕子非止商之仁也蓋萬世之仁乎齊景公待孔子曰若季氏則吾不能以季孟之間待之子曰吾老矣不能用也孔子行孔曰魯三卿季氏為上卿最貴孟氏為下卿不用事言待之以二者之間聖道難行故言老不能用矣韓曰上段孔子行是去齊來魯也下段孔子行是去魯之衛也孔子惡季氏患其强不能制故出行他國李曰按史記孔子世家子在衛使子路伐三桓城不克此是仲尼既不克三桓乃自衛反魯遂作春秋春秋本根不止傷周衰而已抑亦憤齊將為陳氏魯將為季氏云周公謂魯公曰君子不施其親不使大臣怨乎不以孔注曰施易也不以他人之親易已之親以用也怨不見聽用韓曰周公戒伯禽多矣仲尼獨舉此諷哀公不親信賢人爾施當為弛言不弛慢所親近賢人如此則大臣無所施矣謂施為易非也李曰雖有周親不如仁人孔謂他人易已之謂是親戚之親吾謂作親近之親為得子張第十九子夏曰大德不踰間小德出入可也孔曰間猶法也小德不能不踰法故曰出入可也韓曰孔注謂大德不自踰法非也吾謂大德聖人也言學者之於聖人不可踰過其門閾爾小德賢人也尚可出入窺見其奧也李曰防間之間從木義取限分內外故有出入之踰孔注便以間訓法非也况大德之人豈踰法耶孟氏使陽膚為士師問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜馬曰哀矜之勿自喜能得其情韓曰哀矜其民散之情勿喜施其刑罰是其㫖矣李曰家語云魯人有父子訟者孔子為司寇同牢獄縶之父子皆泣子曰上失其教民散久矣皆釋之此有以見哀矜其情不喜施刑罰之驗也馬謂勿喜得其情失之矣堯曰第二十帝臣不蔽簡在帝心包曰桀居帝臣之位罪過不可隱蔽韓曰帝臣湯自謂也言我不可蔽隱桀之罪也包以桀為帝臣非也李曰吾觀湯誥云爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心此是湯稱帝臣明矣疑古文尚書與古文論語傳之有異同焉考其至當即無二義子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司孔曰財物當與人而至吝嗇於出納者有司之任非人君之道也韓曰猶之當為猶上也言君上吝嗇則是有司之財而已李曰仲尼先言虐暴賊三者之弊然後言君上之職當博施濟衆為已任也按古文㞢二字相類明知誤傳矣子曰不知命無以為君子孔曰命謂窮達之分韓曰命謂窮理盡性以至於命也非止窮達論語筆解卷下
